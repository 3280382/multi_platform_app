<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pi AI Chat - 智能对话</title>
  <style>
    /* CSS Variables - Compact */
    :root {
      --color-primary: #3b82f6;
      --color-primary-dark: #2563eb;
      --bg-primary: #0a0a0a;
      --bg-secondary: #171717;
      --bg-tertiary: #262626;
      --bg-elevated: #1a1a1a;
      --text-primary: #fafafa;
      --text-secondary: #a3a3a3;
      --text-tertiary: #737373;
      --border: #262626;
      --header-height: 48px;
      --bottom-height: calc(56px + env(safe-area-inset-bottom, 0px));
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
      --sidebar-width: 260px;
    }
    
    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --bg-elevated: #ffffff;
      --text-primary: #171717;
      --text-secondary: #525252;
      --text-tertiary: #737373;
      --border: #e5e5e5;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { font-size: 14px; -webkit-font-smoothing: antialiased; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }
    
    /* SVG Icons - Compact */
    .icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    
    .icon-sm { width: 16px; height: 16px; }
    .icon-lg { width: 24px; height: 24px; }
    
    /* App Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }
    
    /* Header - Compact */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      padding-top: var(--safe-top);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 12px;
      padding-right: 12px;
      z-index: 100;
    }
    
    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .btn-icon:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
    }
    
    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon svg {
      width: 16px;
      height: 16px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
    }
    
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: white;
    }
    
    /* Sidebar Overlay */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 199;
    }
    
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Sidebar - Compact */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      max-width: 80vw;
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 200;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
    }
    
    .sidebar.active {
      transform: translateX(0);
    }
    
    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      background: var(--color-primary-dark);
    }
    
    .sidebar-section {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }
    
    .sidebar-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 12px 6px;
    }
    
    .chat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      margin: 1px 6px;
      transition: all 0.2s;
    }
    
    .chat-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .chat-item.active {
      background: rgba(59, 130, 246, 0.1);
      color: var(--color-primary);
    }
    
    .chat-item svg {
      stroke: currentColor;
    }
    
    /* Settings Panel - Compact */
    .settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 299;
    }
    
    .settings-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 360px;
      background: var(--bg-primary);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 300;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
    }
    
    .settings-panel.active {
      transform: translateX(0);
    }
    
    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    
    .settings-header h2 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .setting-item:last-child {
      border-bottom: none;
    }
    
    .setting-info h3 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    .setting-info p {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .toggle {
      width: 44px;
      height: 24px;
      background: var(--bg-tertiary);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .toggle.active {
      background: var(--color-primary);
    }
    
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.3s;
    }
    
    .toggle.active::after {
      left: 22px;
    }
    
    /* Main Content - Compact */
    .main {
      flex: 1;
      margin-top: var(--header-height);
      margin-bottom: var(--bottom-height);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      padding-bottom: calc(12px + var(--safe-bottom));
    }
    
    .welcome {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-secondary);
    }
    
    .welcome-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .welcome-icon svg {
      width: 28px;
      height: 28px;
      stroke: white;
      fill: none;
      stroke-width: 2;
    }
    
    .welcome h1 {
      font-size: 20px;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    
    .welcome p {
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    
    .suggestion {
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .suggestion:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    
    /* Messages - Compact */
    .message {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      animation: fadeIn 0.3s;
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: white;
    }
    
    .message.user .msg-avatar {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
    }
    
    .message.ai .msg-avatar {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
    }
    
    .msg-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    
    .message.user .msg-bubble {
      background: var(--color-primary);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.ai .msg-bubble {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    
    /* Input - Compact */
    .input-container {
      position: fixed;
      bottom: var(--bottom-height);
      left: 0;
      right: 0;
      padding: 8px 12px;
      padding-bottom: calc(8px + var(--safe-bottom));
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      z-index: 50;
    }
    
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 10px;
    }
    
    .input-wrapper:focus-within {
      border-color: var(--color-primary);
    }
    
    textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 13px;
      resize: none;
      max-height: 100px;
      min-height: 20px;
      padding: 2px 0;
      outline: none;
      font-family: inherit;
    }
    
    textarea::placeholder {
      color: var(--text-tertiary);
    }
    
    .btn-send {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--color-primary);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    .btn-send:hover:not(:disabled) {
      background: var(--color-primary-dark);
      transform: scale(1.05);
    }
    
    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .hint {
      text-align: center;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }
    
    /* Bottom Nav - Compact */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bottom-height);
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 12px;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 10px;
      font-size: 10px;
    }
    
    .nav-item:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }
    
    .nav-item.active {
      color: var(--color-primary);
    }
    
    .nav-item.active svg {
      stroke: var(--color-primary);
    }
    
    .nav-item svg {
      stroke: currentColor;
    }
    
    .nav-fab {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: white;
      border-radius: 50%;
      margin-top: -16px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .nav-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }
    
    .nav-fab svg {
      stroke: white;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="btn-icon" onclick="toggleSidebar()">
          <svg class="icon"><use href="#icon-menu"/></svg>
        </button>
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><use href="#icon-sparkles"/></svg>
          </div>
          <span>Pi AI</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-icon" onclick="location.reload()" title="刷新">
          <svg class="icon"><use href="#icon-refresh"/></svg>
        </button>
        <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">
          <svg class="icon" id="themeIcon"><use href="#icon-moon"/></svg>
        </button>
        <button class="btn-icon" onclick="toggleSettings()">
          <svg class="icon"><use href="#icon-settings"/></svg>
        </button>
        <div class="avatar">U</div>
      </div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="btn-primary" onclick="newChat(); toggleSidebar();">
          <svg class="icon icon-sm"><use href="#icon-plus"/></svg>
          新对话
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">今天</div>
        <div class="chat-item active" onclick="selectChat(this)">
          <svg class="icon icon-sm"><use href="#icon-message"/></svg>
          <span>前端开发最佳实践</span>
        </div>
        <div class="chat-item" onclick="selectChat(this)">
          <svg class="icon icon-sm"><use href="#icon-message"/></svg>
          <span>React Hooks 使用指南</span>
        </div>
        <div class="sidebar-title">昨天</div>
        <div class="chat-item" onclick="selectChat(this)">
          <svg class="icon icon-sm"><use href="#icon-message"/></svg>
          <span>CSS Grid 布局教程</span>
        </div>
        <div class="chat-item" onclick="selectChat(this)">
          <svg class="icon icon-sm"><use href="#icon-message"/></svg>
          <span>JavaScript 异步编程</span>
        </div>
      </div>
    </aside>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
    
    <!-- Settings Panel -->
    <aside class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h2>设置</h2>
        <button class="btn-icon" onclick="toggleSettings()">
          <svg class="icon"><use href="#icon-close"/></svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <div class="setting-info">
            <h3>深色模式</h3>
            <p>切换应用的主题颜色</p>
          </div>
          <div class="toggle active" id="themeToggle" onclick="toggleThemeSetting()"></div>
        </div>
        <div class="setting-item">
          <div class="setting-info">
            <h3>消息通知</h3>
            <p>接收新消息推送</p>
          </div>
          <div class="toggle active" onclick="this.classList.toggle('active')"></div>
        </div>
        <div class="setting-item">
          <div class="setting-info">
            <h3>自动播放语音</h3>
            <p>自动播放 AI 回复的语音</p>
          </div>
          <div class="toggle" onclick="this.classList.toggle('active')"></div>
        </div>
        <div class="setting-item">
          <div class="setting-info">
            <h3>清除缓存</h3>
            <p>清除本地存储的聊天记录</p>
          </div>
          <button class="btn-icon" onclick="clearCache()">
            <svg class="icon"><use href="#icon-close"/></svg>
          </button>
        </div>
        <div class="setting-item">
          <div class="setting-info">
            <h3>关于</h3>
            <p>版本 1.4.0</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24"><use href="#icon-sparkles"/></svg>
          </div>
          <h1>你好！我是 Pi AI</h1>
          <p>我可以帮你解答问题、创作内容、编写代码，或者只是聊聊天。</p>
          <div class="suggestions">
            <div class="suggestion" onclick="send('帮我写一个React组件')">写代码</div>
            <div class="suggestion" onclick="send('解释什么是机器学习')">解释概念</div>
            <div class="suggestion" onclick="send('帮我写一封邮件')">写邮件</div>
            <div class="suggestion" onclick="send('推荐几本好书')">推荐书籍</div>
          </div>
        </div>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <textarea id="input" rows="1" placeholder="输入你的问题..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" id="sendBtn" onclick="send()">
            <svg class="icon icon-sm" style="stroke: white;"><use href="#icon-send"/></svg>
          </button>
        </div>
        <div class="hint">按 Enter 发送，Shift + Enter 换行</div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="switchTab(this)">
        <svg class="icon"><use href="#icon-chat"/></svg>
        <span>对话</span>
      </button>
      <button class="nav-item" onclick="switchTab(this)">
        <svg class="icon"><use href="#icon-compass"/></svg>
        <span>发现</span>
      </button>
      <button class="nav-item nav-fab" onclick="newChat()" title="新对话">
        <svg class="icon icon-lg"><use href="#icon-plus"/></svg>
      </button>
      <button class="nav-item" onclick="switchTab(this)">
        <svg class="icon"><use href="#icon-clock"/></svg>
        <span>历史</span>
      </button>
      <button class="nav-item" onclick="switchTab(this)">
        <svg class="icon"><use href="#icon-user"/></svg>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <script>
    // State
    let currentTheme = 'dark';
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const welcome = document.getElementById('welcome');
    const sendBtn = document.getElementById('sendBtn');

    // Toggle Sidebar
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    // Toggle Settings
    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('active');
      document.getElementById('settingsOverlay').classList.toggle('active');
    }

    // Toggle Theme
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      document.getElementById('themeIcon').innerHTML = currentTheme === 'dark' 
        ? '<use href="#icon-moon"/>' : '<use href="#icon-sun"/>';
      localStorage.setItem('theme', currentTheme);
      updateThemeToggle();
    }

    function toggleThemeSetting() {
      toggleTheme();
    }

    function updateThemeToggle() {
      const toggle = document.getElementById('themeToggle');
      if (currentTheme === 'dark') {
        toggle.classList.add('active');
      } else {
        toggle.classList.remove('active');
      }
    }

    // Clear Cache
    function clearCache() {
      if (confirm('确定要清除所有聊天记录吗？')) {
        localStorage.clear();
        alert('缓存已清除');
      }
    }

    // Select Chat
    function selectChat(el) {
      document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    // Auto-resize textarea
    function autoResize(t) {
      t.style.height = 'auto';
      t.style.height = Math.min(t.scrollHeight, 120) + 'px';
    }

    // Handle Key
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    // Send Message
    function send(text) {
      const msg = text || input.value.trim();
      if (!msg) return;

      welcome.style.display = 'none';
      addMessage('user', msg, 'U');
      input.value = '';
      input.style.height = 'auto';

      showTyping();
      sendBtn.disabled = true;

      setTimeout(() => {
        hideTyping();
        const resp = generateResponse(msg);
        addMessage('ai', resp, 'AI');
        sendBtn.disabled = false;
      }, 1000 + Math.random() * 1000);
    }

    // Add Message
    function addMessage(sender, text, initial) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      const content = text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code style="background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-family:monospace;">$1</code>')
        .replace(/\n/g, '<br>');
      
      div.innerHTML = `
        <div class="msg-avatar">${initial}</div>
        <div class="msg-bubble">${content}</div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    // Typing Indicator
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message ai';
      div.id = 'typing';
      div.innerHTML = `
        <div class="msg-avatar">AI</div>
        <div class="msg-bubble" style="display:flex;gap:4px;padding:16px 20px;">
          <span style="animation:bounce 1.4s infinite .0s">●</span>
          <span style="animation:bounce 1.4s infinite .2s">●</span>
          <span style="animation:bounce 1.4s infinite .4s">●</span>
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    // Generate Response
    function generateResponse(msg) {
      if (msg.includes('代码') || msg.includes('编程')) {
        return "```javascript\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\nconsole.log(greet('World'));\n```";
      }
      if (msg.includes('你好')) return "你好！很高兴见到你。😊";
      const resps = [
        "这是一个很好的问题！让我为你解释一下...",
        "我理解你的需求。建议你可以这样处理...",
        "没问题！这是你要的内容。",
        "有趣的想法！从以下几个角度思考..."
      ];
      return resps[Math.floor(Math.random() * resps.length)];
    }

    // New Chat
    function newChat() {
      messages.querySelectorAll('.message, #typing').forEach(m => m.remove());
      welcome.style.display = 'block';
      input.value = '';
    }

    // Switch Tab
    function switchTab(el) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    // Init
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      currentTheme = savedTheme;
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('themeIcon').innerHTML = savedTheme === 'dark' 
        ? '<use href="#icon-moon"/>' : '<use href="#icon-sun"/>';
      updateThemeToggle();
    }
  </script>
</body>
</html>
