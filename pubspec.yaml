name: multi_platform_app
description: A classic multi-platform Flutter app with navigation and image browsing

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^12.1.1
  flutter_riverpod: ^2.4.9
  responsive_framework: ^1.1.1
  carousel_slider: ^4.2.1
  photo_view: ^0.14.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto-Light.ttf
          weight: 300
