name: ai_chat_webview
description: AI Chat WebView - Flutter app with webview_flutter loading local HTML

publish_to: 'none'

version: 1.2.0+2

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.3.0
  cached_network_image: ^3.3.1
  go_router: ^14.0.0
  flutter_riverpod: ^2.6.1
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/