name: multi_platform_app
description: A classic multi-platform Flutter app with navigation and image browsing

publish_to: 'none'

version: 1.2.0+2

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  go_router: ^14.0.0
  flutter_riverpod: ^2.6.1
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  share_plus: ^10.0.0
  url_launcher: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true